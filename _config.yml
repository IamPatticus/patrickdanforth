# Jekyll config to exclude non-website directories from GitHub Pages build
exclude:
  - memory/
  - scripts/
  - services/
  - archive/
  - backup-export/
  - .composio/
  - patrickdanforth-site/
  - chaotic-sanctum-site/
  - whisplay-im-openclaw-plugin/
  - "*.sh"
  - "*.py"
  - "*.log"
  - "*.state"
  - "victron-logger.py"
  - "victron-api.py"
  - "victron-update.sh"
  - "update-victron.sh"
  - EOF
  - "1"
