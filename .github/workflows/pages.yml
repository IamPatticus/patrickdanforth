name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir -p _site
          # Copy top-level HTML and assets
          cp -r index.html reginald.html chaotic-thoughts.html devices.html status.html headache.html venus-os.html reginald-flipbook.html favicon.ico favicon.png CNAME _site/ 2>/dev/null || true
          # Copy website directories
          cp -r blog rockinregi avatars ikaris-images rockinregi-images _site/ 2>/dev/null || true
          # Remove any .git directories just in case
          find _site -type d -name .git -exec rm -rf {} + 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
