name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir -p _site
          # Copy all top-level HTML files and static assets
          cp *.html favicon.ico favicon.png CNAME _site/ 2>/dev/null || true
          # Copy website directories
          cp -r blog rockinregi reginald-flipbook avatars ikaris-images rockinregi-images _site/ 2>/dev/null || true
          # Remove any .git directories just in case
          find _site -type d -name .git -exec rm -rf {} + 2>/dev/null || true
          # List what we're deploying
          echo "Staged files:"
          find _site -maxdepth 1 -type f | sort

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
