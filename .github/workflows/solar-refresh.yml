name: Solar Scoreboard Refresh

on:
  schedule:
    # Run every 5 minutes during daylight hours (6am-10pm Chicago = 12-22 UTC)
    - cron: '*/5 12-22 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          ssh-key: ${{ secrets.GH_PUSH_KEY }}

      - name: Pull latest snapshot
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git pull origin main --no-edit || true

      - name: Commit and push if changed
        run: |
          if git diff --quiet solar-snapshot.json; then
            echo "No changes to snapshot"
            exit 0
          fi

          git add solar-snapshot.json
          git commit -m "Update solar snapshot: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
