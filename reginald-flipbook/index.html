<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reginald's Daily Chronicles — Flipbook</title>
  <meta property="og:title" content="Reginald's Daily Chronicles">
  <meta property="og:description" content="The life and times of Reginald J. Crustacean, Chief Digital Shellfish Analyst">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e14 url('bg.png') center top no-repeat;
      background-size: cover;
      background-attachment: fixed;
      color: #d0d8e0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      position: relative;
    }
    .home-btn {
      position: absolute;
      top: 24px;
      left: 24px;
      color: #7ae7ff;
      text-decoration: none;
      font-size: 0.95em;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s;
    }
    .home-btn:hover {
      opacity: 0.8;
    }
    h1 {
      margin-top: 28px;
      font-size: 1.8em;
      margin-bottom: 4px;
      color: #7ae7ff;
      font-weight: 700;
    }
    .subtitle {
      color: #788898;
      margin-bottom: 8px;
      font-size: 0.95em;
    }
    .tagline {
      color: #9a6b3c;
      font-size: 0.85em;
      margin-bottom: 24px;
      font-style: italic;
    }
    .flipbook-container {
      max-width: 900px;
      width: 100%;
      background: #111820;
      border-radius: 16px;
      border: 1px solid #1e2a3a;
      overflow: hidden;
    }
    .comic-viewer {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    .comic-image {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #1e2a3a;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .comic-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-top: 16px;
      padding: 0 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .date-display {
      color: #7ae7ff;
      font-size: 0.95em;
      font-weight: 500;
    }
    .counter {
      color: #788898;
      font-size: 0.85em;
    }
    .nav-buttons {
      display: flex;
      gap: 12px;
    }
    .nav-btn {
      background: #1a2535;
      border: 1px solid #2a3a50;
      color: #d0d8e0;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9em;
      transition: background 0.2s, border-color 0.2s;
      font-family: inherit;
    }
    .nav-btn:hover:not(:disabled) {
      background: #243045;
      border-color: #7ae7ff;
    }
    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .filmstrip {
      display: flex;
      gap: 8px;
      padding: 16px;
      overflow-x: auto;
      background: #0d1218;
      border-top: 1px solid #1e2a3a;
      scrollbar-width: thin;
      scrollbar-color: #2a3a50 #0d1218;
    }
    .filmstrip::-webkit-scrollbar {
      height: 6px;
    }
    .filmstrip::-webkit-scrollbar-track {
      background: #0d1218;
    }
    .filmstrip::-webkit-scrollbar-thumb {
      background: #2a3a50;
      border-radius: 3px;
    }
    .filmstrip-item {
      flex-shrink: 0;
      width: 80px;
      height: 80px;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.6;
      transition: opacity 0.2s, border-color 0.2s, transform 0.15s;
    }
    .filmstrip-item:hover {
      opacity: 0.9;
      transform: scale(1.05);
    }
    .filmstrip-item.active {
      opacity: 1;
      border-color: #7ae7ff;
    }
    .filmstrip-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .home-link {
      margin-top: 24px;
      color: #788898;
      font-size: 0.9em;
    }
    .home-link a {
      color: #7ae7ff;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .home-link a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }
    .loading {
      color: #788898;
      font-size: 1.2em;
      padding: 40px;
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.4em; }
      .comic-meta { flex-direction: column; align-items: stretch; text-align: center; }
      .nav-buttons { justify-content: center; }
      .filmstrip-item { width: 60px; height: 60px; }
    }
  </style>
</head>
<body>
  <a href="https://patrickdanforth.com/" class="home-btn"><span style="font-size:1.2em;">←</span> Home</a>
  <h1>🦞 Reginald's Daily Chronicles</h1>
  <p class="subtitle">The life and times of Reginald J. Crustacean</p>
  <p class="tagline">Chief Digital Shellfish Analyst &bull; Disciple of Controlled Chaos</p>

  <div class="flipbook-container">
    <div class="comic-viewer">
      <div id="loadingMsg" class="loading">Loading comics...</div>
      <img id="comicImage" class="comic-image" src="" alt="Reginald Daily Comic" style="display:none;">
      <div class="comic-meta" id="comicMeta" style="display:none;">
        <span id="dateDisplay" class="date-display"></span>
        <span id="counter" class="counter"></span>
        <div class="nav-buttons">
          <button id="prevBtn" class="nav-btn" onclick="prevComic()">← Previous</button>
          <button id="nextBtn" class="nav-btn" onclick="nextComic()">Next →</button>
        </div>
      </div>
    </div>
    <div id="filmstrip" class="filmstrip"></div>
  </div>

  <p class="home-link"><a href="https://patrickdanforth.com/reginald.html">← Back to Reginald's Lair</a></p>

  <script>
    let imageData = [];
    let currentIndex = 0;
    const imgEl = document.getElementById('comicImage');
    const dateEl = document.getElementById('dateDisplay');
    const counterEl = document.getElementById('counter');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const filmstripEl = document.getElementById('filmstrip');
    const loadingEl = document.getElementById('loadingMsg');
    const metaEl = document.getElementById('comicMeta');

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }

    function updateView() {
      if (imageData.length === 0) return;
      const item = imageData[currentIndex];
      imgEl.src = 'images/' + item.filename;
      dateEl.textContent = formatDate(item.date);
      counterEl.textContent = (currentIndex + 1) + ' / ' + imageData.length;
      prevBtn.disabled = currentIndex >= imageData.length - 1;
      nextBtn.disabled = currentIndex <= 0;

      document.querySelectorAll('.filmstrip-item').forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
        if (i === currentIndex) {
          el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
      });
    }

    function prevComic() {
      if (currentIndex < imageData.length - 1) {
        currentIndex++;
        updateView();
      }
    }

    function nextComic() {
      if (currentIndex > 0) {
        currentIndex--;
        updateView();
      }
    }

    function buildFilmstrip() {
      filmstripEl.innerHTML = '';
      imageData.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'filmstrip-item' + (i === 0 ? ' active' : '');
        div.onclick = () => { currentIndex = i; updateView(); };
        const thumb = document.createElement('img');
        thumb.src = 'images/' + item.filename;
        thumb.alt = item.date;
        thumb.loading = 'lazy';
        div.appendChild(thumb);
        filmstripEl.appendChild(div);
      });
    }

    async function loadComics() {
      try {
        const response = await fetch('index.json');
        if (!response.ok) throw new Error('Failed to load index.json');
        const data = await response.json();
        imageData = data.entries.slice().reverse(); // Newest first

        if (imageData.length === 0) {
          loadingEl.textContent = 'No comics found.';
          return;
        }

        loadingEl.style.display = 'none';
        imgEl.style.display = '';
        metaEl.style.display = '';

        buildFilmstrip();
        updateView();
      } catch (err) {
        loadingEl.textContent = 'Error loading comics: ' + err.message;
        console.error(err);
      }
    }

    // Keyboard nav
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') prevComic();
      if (e.key === 'ArrowRight') nextComic();
    });

    // Load on page load
    loadComics();
  </script>
