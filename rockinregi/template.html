<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <title>{{TITLE}} — Rockin Regi</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Impact&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f5f0e6;
      --paper-dark: #e8e0d0;
      --ink: #1a1a2e;
      --accent: #ff0080;
      --cyan: #00d4ff;
      --burst-yellow: #ffdd00;
      --burst-red: #ff3333;
      --panel-border: #1a1a2e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      color: var(--ink); font-family: 'Comic Neue', cursive;
      background: #2a2a3e; min-height: 100vh;
      padding: 1rem;
    }
    .comic-page {
      max-width: 900px; margin: 0 auto;
      background: var(--paper);
      border: 4px solid var(--ink);
      box-shadow:
        0 0 0 2px var(--paper-dark),
        0 10px 40px rgba(0,0,0,0.4),
        inset 0 0 100px rgba(0,0,0,0.05);
      padding: 1.5rem;
      position: relative;
    }
    .comic-page::before {
      content: "";
      position: absolute; inset: 8px;
      border: 2px solid var(--ink);
      pointer-events: none;
      opacity: 0.3;
    }
    /* Halftone pattern overlay */
    .comic-page::after {
      content: "";
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 4px 4px;
      pointer-events: none;
    }
    
    /* Header */
    .comic-header {
      text-align: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 3px solid var(--ink);
    }
    .comic-header h1 {
      font-family: 'Bangers', cursive;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink);
      text-shadow: 3px 3px 0 rgba(255,0,128,0.3);
      margin-bottom: 0.5rem;
    }
    .issue-tag {
      display: inline-block;
      background: var(--burst-yellow);
      border: 2px solid var(--ink);
      padding: 0.3rem 1rem;
      font-family: 'Bangers', cursive;
      font-size: 0.9rem;
      letter-spacing: 1px;
      transform: rotate(-2deg);
      box-shadow: 3px 3px 0 var(--ink);
    }
    .nav-back {
      position: absolute; top: 1rem; left: 1rem;
      font-family: 'Bangers', cursive;
      font-size: 0.85rem;
    }
    .nav-back a {
      color: var(--ink); text-decoration: none;
      background: var(--burst-yellow);
      border: 2px solid var(--ink);
      padding: 0.3rem 0.8rem;
      display: inline-block;
      transform: rotate(-3deg);
      box-shadow: 2px 2px 0 var(--ink);
      transition: transform 0.2s;
    }
    .nav-back a:hover {
      transform: rotate(0deg) scale(1.05);
    }
    
    /* Hero Image */
    .hero-image {
      width: 100%;
      border: 3px solid var(--ink);
      margin-bottom: 1.5rem;
      display: block;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
    }
    
    /* Comic Grid */
    .comic-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .comic-panel {
      background: #fff;
      border: 3px solid var(--panel-border);
      padding: 1rem;
      position: relative;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.15);
    }
    .comic-panel.wide {
      grid-column: 1 / -1;
    }
    .comic-panel.full {
      grid-column: 1 / -1;
    }
    
    /* Panel number badge */
    .panel-number {
      position: absolute; top: -12px; left: 10px;
      background: var(--burst-yellow);
      border: 2px solid var(--ink);
      padding: 0.15rem 0.6rem;
      font-family: 'Bangers', cursive;
      font-size: 0.8rem;
      letter-spacing: 1px;
      box-shadow: 2px 2px 0 var(--ink);
      z-index: 2;
    }
    
    /* Speech Bubbles */
    .speech-bubble {
      background: #fff;
      border: 2px solid var(--ink);
      border-radius: 50%;
      padding: 1rem 1.5rem;
      margin: 0.75rem 0;
      position: relative;
      font-family: 'Comic Neue', cursive;
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.4;
      text-align: center;
    }
    .speech-bubble::after {
      content: "";
      position: absolute;
      bottom: -15px; left: 30%;
      width: 0; height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 20px solid var(--ink);
    }
    .speech-bubble::before {
      content: "";
      position: absolute;
      bottom: -11px; left: calc(30% + 2px);
      width: 0; height: 0;
      border-left: 13px solid transparent;
      border-right: 13px solid transparent;
      border-top: 17px solid #fff;
      z-index: 1;
    }
    .speech-bubble.reginald {
      background: #e6f7ff;
      border-color: var(--cyan);
    }
    .speech-bubble.reginald::after {
      border-top-color: var(--cyan);
    }
    .speech-bubble.reginald::before {
      border-top-color: #e6f7ff;
    }
    
    /* Caption Box */
    .caption-box {
      background: var(--paper-dark);
      border: 2px solid var(--ink);
      padding: 0.75rem 1rem;
      margin: 0.75rem 0;
      font-family: 'Comic Neue', cursive;
      font-style: italic;
      font-size: 0.95rem;
      position: relative;
    }
    .caption-box::before {
      content: "📍";
      margin-right: 0.5rem;
    }
    
    /* Sound Effect / Burst */
    .burst {
      display: inline-block;
      background: var(--burst-yellow);
      border: 3px solid var(--ink);
      padding: 0.5rem 1rem;
      font-family: 'Bangers', cursive;
      font-size: 1.3rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transform: rotate(-5deg);
      box-shadow: 3px 3px 0 var(--ink);
      margin: 0.5rem 0;
    }
    .burst.red {
      background: var(--burst-red);
      color: #fff;
    }
    .burst.cyan {
      background: var(--cyan);
      color: var(--ink);
    }
    
    /* Action Lines */
    .action-lines {
      text-align: center;
      margin: 1rem 0;
      position: relative;
    }
    .action-lines::before,
    .action-lines::after {
      content: "💥";
      position: absolute;
      font-size: 1.5rem;
    }
    .action-lines::before { left: 10%; top: -5px; }
    .action-lines::after { right: 10%; bottom: -5px; }
    
    /* Footer */
    .comic-footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 3px solid var(--ink);
      font-family: 'Bangers', cursive;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    .comic-footer a {
      color: var(--ink);
      text-decoration: none;
      background: var(--burst-yellow);
      border: 2px solid var(--ink);
      padding: 0.3rem 1rem;
      display: inline-block;
      box-shadow: 2px 2px 0 var(--ink);
    }
    
    /* Responsive */
    @media (max-width: 640px) {
      .comic-grid { grid-template-columns: 1fr; }
      .comic-page { padding: 1rem; margin: 0.5rem; }
      .comic-header h1 { font-size: 1.8rem; }
      .nav-back { position: static; margin-bottom: 1rem; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="comic-page">
    <div class="nav-back"><a href="./index.html">← BACK TO ROCKIN REGI</a></div>
    
    <div class="comic-header">
      <div class="issue-tag">CHAOTIC SANCTUM CHRONICLES — {{DATE}}</div>
      <h1>{{TITLE}}</h1>
    </div>
    
    {{#HERO_IMAGE}}
    <img src="{{HERO_IMAGE}}" alt="{{TITLE}}" class="hero-image" />
    {{/HERO_IMAGE}}
    
    <div class="comic-grid">
      {{PANELS}}
    </div>
    
    <div class="comic-footer">
      <a href="./index.html">← MORE FROM REGINALD</a>
    </div>
  </div>
</body>
</html>
