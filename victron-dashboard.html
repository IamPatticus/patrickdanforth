<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victron Live Monitor — Patticus Power Grid</title>
  <style>
    :root {
      --bg: #06070b; --panel: rgba(15, 18, 27, 0.95); --line: rgba(130, 177, 255, 0.2);
      --text: #edf3ff; --muted: #9aa7c2; --cyan: #7ae7ff; --gold: #d7aa61;
      --ember: #ff7a4d; --green: #7effb2; --red: #ff6b6b; --blue: #6b9fff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      background: var(--bg) url('https://raw.githubusercontent.com/IamPatticus/patrickdanforth/main/victron-bg.jpg') center/cover fixed; 
      color: var(--text); 
      min-height: 100vh; 
      padding: 20px; 
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(6, 7, 11, 0.92);
      z-index: -1;
    }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { font-size: 1.8rem; color: var(--gold); margin-bottom: 8px; }
    .header .timestamp { color: var(--muted); font-size: 0.85rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 20px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .card-title { font-size: 1.2rem; color: var(--cyan); }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .status-online { background: rgba(126, 255, 178, 0.15); color: var(--green); }
    .status-offline { background: rgba(255, 107, 107, 0.15); color: var(--red); }
    .metric { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(130, 177, 255, 0.08); }
    .metric:last-child { border-bottom: none; }
    .metric-label { color: var(--muted); font-size: 0.9rem; }
    .metric-value { font-weight: 600; font-size: 0.95rem; }
    .soc-bar { width: 100%; height: 8px; background: rgba(130, 177, 255, 0.1); border-radius: 4px; margin-top: 8px; overflow: hidden; }
    .soc-fill { height: 100%; border-radius: 4px; }
    .soc-high { background: var(--green); } .soc-medium { background: var(--gold); } .soc-low { background: var(--ember); }
    .power-positive { color: var(--green); } .power-negative { color: var(--ember); }
    .temp-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(130, 177, 255, 0.15); }
    .temp-title { font-size: 0.85rem; color: var(--blue); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
    .temp-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.9rem; }
    .temp-value { font-weight: 600; }
    .temp-cold { color: var(--cyan); }
    .temp-warm { color: var(--ember); }
    .temp-normal { color: var(--green); }
    .footer { text-align: center; margin-top: 40px; color: var(--muted); font-size: 0.8rem; }
    .footer a { color: var(--cyan); text-decoration: none; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .header h1 { font-size: 1.4rem; } }
    .card-links { text-align: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(130, 177, 255, 0.1); }
    .cerbo-link { display: inline-block; padding: 6px 14px; background: rgba(122, 231, 255, 0.1); color: var(--cyan); text-decoration: none; border-radius: 6px; font-size: 0.8rem; border: 1px solid rgba(122, 231, 255, 0.2); transition: all 0.2s; }
    .cerbo-link:hover { background: rgba(122, 231, 255, 0.2); border-color: var(--cyan); }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ Victron Live Monitor</h1>
    <p class="timestamp" id="timestamp">Last updated: Loading...</p>
  </div>
  <div id="dashboard" class="grid"></div>
  <div class="footer">
    <p>Data from Victron Cerbo/SmartShunt via MQTT | <a href="solar.html">← Solar Overview</a></p>
  </div>

  <script>
    var VICTRON_DATA = {
  "timestamp": "2026-07-17T17:15:05.078143",
  "devices": {
    "house": {
      "name": "House",
      "ip": "192.168.1.243",
      "online": false,
      "battery": {
        "soc": 79.5,
        "voltage": 52.98,
        "current": -10.0,
        "power": -530,
        "time_to_go": 110000,
        "name": "Homestead"
      },
      "solar": {
        "power": 0
      },
      "ac": {
        "consumption": 520
      }
    },
    "shop": {
      "name": "Shop",
      "ip": "192.168.1.128",
      "online": false,
      "battery": {
        "soc": 79.8,
        "voltage": 52.71,
        "current": -3.4,
        "power": -179,
        "time_to_go": 274800,
        "name": "SmartShunt Shop"
      },
      "solar": {
        "power": 0
      },
      "ac": {
        "consumption": 0
      }
    },
    "van": {
      "name": "Van",
      "ip": "192.168.1.140",
      "online": false,
      "battery": {
        "soc": 99.7,
        "voltage": 13.35,
        "current": -0.7,
        "power": -9.3,
        "time_to_go": 553200,
        "name": "Vanny Van Shunt"
      },
      "solar": {
        "power": 0
      },
      "ac": {
        "consumption": 0
      }
    }
  }
};

    function cToF(c) {
      return (c * 9/5) + 32;
    }

    function fmtDur(s) {
      if (!s || s <= 0) return 'N/A';
      var h = Math.floor(s / 3600);
      var d = Math.floor(h / 24);
      return d > 0 ? d + 'd ' + (h % 24) + 'h' : h + 'h';
    }

    function socClass(s) {
      return s >= 80 ? 'soc-high' : s >= 50 ? 'soc-medium' : 'soc-low';
    }

    function tempClass(t) {
      if (t < 0) return 'temp-cold';
      if (t > 35) return 'temp-warm';
      return 'temp-normal';
    }

    function render() {
      document.getElementById('timestamp').textContent = 'Last updated: ' + new Date(VICTRON_DATA.timestamp).toLocaleString();
      var html = '';
      
      for (var key in VICTRON_DATA.devices) {
        var dev = VICTRON_DATA.devices[key];
        var bat = dev.battery || {};
        var sol = dev.solar || {};
        var ac = dev.ac || {};
        var temps = dev.temperatures || [];
        var soc = bat.soc || 0;
        var sc = socClass(soc);
        var online = dev.online;
        
        html += '<div class="card">';
        html += '<div class="card-header"><span class="card-title">' + dev.name + '</span>';
        html += '<span class="status-badge ' + (online ? 'status-online' : 'status-offline') + '"\u003e' + (online ? '● Online' : '● Offline') + '</span></div>';
        html += '<div class="card-links"><a href="http://' + dev.ip + '/gui-v2/" target="_blank" class="cerbo-link">⚙️ Cerbo</a></div>';
        
        html += '<div class="metric"><span class="metric-label">Battery SOC</span>';
        html += '<span class="metric-value" style="color:' + (sc === 'soc-high' ? '#7effb2' : sc === 'soc-medium' ? '#d7aa61' : '#ff7a4d') + '">' + soc.toFixed(1) + '%</span></div>';
        html += '<div class="soc-bar"><div class="soc-fill ' + sc + '" style="width:' + soc + '%"></div></div>';
        
        html += '<div class="metric"><span class="metric-label">Voltage</span><span class="metric-value">' + (bat.voltage ? bat.voltage.toFixed(2) + 'V' : 'N/A') + '</span></div>';
        html += '<div class="metric"><span class="metric-label">Current</span><span class="metric-value ' + (bat.current < 0 ? 'power-negative' : 'power-positive') + '">' + (bat.current ? bat.current.toFixed(1) + 'A' : 'N/A') + '</span></div>';
        html += '<div class="metric"><span class="metric-label">Power</span><span class="metric-value ' + (bat.power < 0 ? 'power-negative' : 'power-positive') + '">' + (bat.power ? bat.power.toFixed(0) + 'W' : 'N/A') + '</span></div>';
        html += '<div class="metric"><span class="metric-label">Solar Production</span><span class="metric-value ' + (sol.power > 0 ? 'power-positive' : '') + '">' + (sol.power !== undefined ? sol.power.toFixed(0) + 'W' : 'N/A') + '</span></div>';
        html += '<div class="metric"><span class="metric-label">AC Load</span><span class="metric-value">' + (ac.consumption ? ac.consumption.toFixed(0) + 'W' : 'N/A') + '</span></div>';
        html += '<div class="metric"><span class="metric-label">Time to Go</span><span class="metric-value">' + fmtDur(bat.time_to_go) + '</span></div>';
        
        // Temperature section
        if (temps.length > 0) {
          html += '<div class="temp-section">';
          html += '<div class="temp-title">🌡️ Temperatures</div>';
          for (var i = 0; i < temps.length; i++) {
            var t = temps[i];
            var tc = tempClass(t.temperature);
            var extra = '';
            if (t.humidity) extra += ' · ' + t.humidity.toFixed(1) + '% RH';
            if (t.pressure) extra += ' · ' + t.pressure.toFixed(1) + ' hPa';
            html += '<div class="temp-item">';
            html += '<span>' + t.name + extra + '</span>';
            html += '<span class="temp-value ' + tc + '">' + t.temperature.toFixed(1) + '°C / ' + cToF(t.temperature).toFixed(1) + '°F</span>';
            html += '</div>';
          }
          html += '</div>';
        }
        
        html += '</div>';
      }
      document.getElementById('dashboard').innerHTML = html;
    }

    render();
  </script>
</body>
</html>
