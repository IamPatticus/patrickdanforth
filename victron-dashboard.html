<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victron Live Monitor — Patticus Power Grid</title>
  <style>
    :root {
      --bg: #06070b;
      --panel: rgba(15, 18, 27, 0.95);
      --line: rgba(130, 177, 255, 0.2);
      --text: #edf3ff;
      --muted: #9aa7c2;
      --cyan: #7ae7ff;
      --gold: #d7aa61;
      --ember: #ff7a4d;
      --green: #7effb2;
      --red: #ff6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 1.8rem;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .header .timestamp {
      color: var(--muted);
      font-size: 0.85rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: var(--cyan);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 1.2rem;
      color: var(--cyan);
    }
    .status-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-online {
      background: rgba(126, 255, 178, 0.15);
      color: var(--green);
    }
    .status-offline {
      background: rgba(255, 107, 107, 0.15);
      color: var(--red);
    }
    .metric {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(130, 177, 255, 0.08);
    }
    .metric:last-child {
      border-bottom: none;
    }
    .metric-label {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .metric-value {
      font-weight: 600;
      font-size: 0.95rem;
    }
    .soc-bar {
      width: 100%;
      height: 8px;
      background: rgba(130, 177, 255, 0.1);
      border-radius: 4px;
      margin-top: 8px;
      overflow: hidden;
    }
    .soc-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .soc-high { background: var(--green); }
    .soc-medium { background: var(--gold); }
    .soc-low { background: var(--ember); }
    .power-positive { color: var(--green); }
    .power-negative { color: var(--ember); }
    .footer {
      text-align: center;
      margin-top: 40px;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .footer a {
      color: var(--cyan);
      text-decoration: none;
    }
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ Victron Live Monitor</h1>
    <p class="timestamp" id="timestamp">Loading...</p>
  </div>

  <div class="grid" id="dashboard">
    <!-- Cards will be generated by JavaScript -->
  </div>

  <div class="footer">
    <p>Data from Victron Cerbo/SmartShunt via MQTT | <a href="solar.html">← Solar Overview</a></p>
  </div>

  <script>
    // Fetch data from victron-data.json
    async function loadData() {
      try {
        const response = await fetch('victron-data.json');
        if (!response.ok) throw new Error('Failed to fetch');
        const data = await response.json();
        renderDashboard(data);
      } catch (e) {
        document.getElementById('dashboard').innerHTML = 
          '<div style="text-align:center;color:var(--red);padding:40px;">' +
          'Failed to load data. Make sure victron-data.json is in the same directory.' +
          '</div>';
      }
    }

    function formatDuration(seconds) {
      if (!seconds || seconds <= 0) return 'N/A';
      const hours = Math.floor(seconds / 3600);
      const days = Math.floor(hours / 24);
      if (days > 0) return `${days}d ${hours % 24}h`;
      return `${hours}h`;
    }

    function getSocClass(soc) {
      if (soc >= 80) return 'soc-high';
      if (soc >= 50) return 'soc-medium';
      return 'soc-low';
    }

    function renderDashboard(data) {
      const dashboard = document.getElementById('dashboard');
      const timestamp = document.getElementById('timestamp');
      
      timestamp.textContent = `Last updated: ${new Date(data.timestamp).toLocaleString()}`;
      
      let html = '';
      
      for (const [key, device] of Object.entries(data.devices)) {
        const battery = device.battery || {};
        const solar = device.solar || {};
        const ac = device.ac || {};
        
        const soc = battery.soc || 0;
        const socClass = getSocClass(soc);
        const isOnline = device.online;
        
        html += `
          <div class="card">
            <div class="card-header">
              <span class="card-title">${device.name}</span>
              <span class="status-badge ${isOnline ? 'status-online' : 'status-offline'}">
                ${isOnline ? '● Online' : '● Offline'}
              </span>
            </div>
            
            <div class="metric">
              <span class="metric-label">Battery SOC</span>
              <span class="metric-value" style="color: var(--${socClass === 'soc-high' ? 'green' : socClass === 'soc-medium' ? 'gold' : 'ember'})">${soc.toFixed(1)}%</span>
            </div>
            <div class="soc-bar">
              <div class="soc-fill ${socClass}" style="width: ${soc}%"></div>
            </div>
            
            <div class="metric">
              <span class="metric-label">Voltage</span>
              <span class="metric-value">${battery.voltage ? battery.voltage.toFixed(2) + 'V' : 'N/A'}</span>
            </div>
            
            <div class="metric">
              <span class="metric-label">Current</span>
              <span class="metric-value ${battery.current < 0 ? 'power-negative' : 'power-positive'}">
                ${battery.current ? battery.current.toFixed(1) + 'A' : 'N/A'}
              </span>
            </div>
            
            <div class="metric">
              <span class="metric-label">Power</span>
              <span class="metric-value ${battery.power < 0 ? 'power-negative' : 'power-positive'}">
                ${battery.power ? battery.power.toFixed(0) + 'W' : 'N/A'}
              </span>
            </div>
            
            <div class="metric">
              <span class="metric-label">Solar Production</span>
              <span class="metric-value ${solar.power > 0 ? 'power-positive' : ''}">
                ${solar.power !== undefined ? solar.power.toFixed(0) + 'W' : 'N/A'}
              </span>
            </div>
            
            <div class="metric">
              <span class="metric-label">AC Load</span>
              <span class="metric-value">${ac.consumption ? ac.consumption.toFixed(0) + 'W' : 'N/A'}</span>
            </div>
            
            <div class="metric">
              <span class="metric-label">Time to Go</span>
              <span class="metric-value">${formatDuration(battery.time_to_go)}</span>
            </div>
            
            <div class="metric">
              <span class="metric-label">Device</span>
              <span class="metric-value" style="font-size:0.8rem;color:var(--muted)">${battery.name || 'Unknown'}</span>
            </div>
          </div>
        `;
      }
      
      dashboard.innerHTML = html;
    }

    // Load data immediately and refresh every 30 seconds
    loadData();
    setInterval(loadData, 30000);
  </script>
</body>
</html>
