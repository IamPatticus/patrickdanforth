<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Scoreboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  
  :root {
    --bg: #0a0e14;
    --card: #111820;
    --border: #1e2a36;
    --text: #d0d8e0;
    --dim: #788898;
    --green: #2ecc71;
    --yellow: #f1c40f;
    --orange: #e67e22;
    --red: #e74c3c;
    --blue: #3498db;
    --purple: #9b59b6;
    --sun: #f39c12;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .back-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 24px;
    background: rgba(10,14,20,0.95);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .back-bar a {
    color: var(--blue);
    text-decoration: none;
  }

  .back-bar a:hover { color: var(--cyan); }

  .back-bar .live-label {
    color: var(--dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    padding: 24px;
    min-height: 100vh;
  }

  .container { max-width: 1200px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .header-left .subtitle {
    color: var(--dim);
    font-size: 13px;
    margin-top: 4px;
  }

  .header-right {
    text-align: right;
    font-size: 13px;
    color: var(--dim);
  }

  /* Totals Bar */
  .totals-bar {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 24px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }

  .total-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    text-align: center;
  }

  .total-card .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--dim);
    margin-bottom: 6px;
  }

  .total-card .value {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
  }

  .total-card .value.green { color: var(--green); }
  .total-card .value.orange { color: var(--orange); }
  .total-card .value.red { color: var(--red); }
  .total-card .value.blue { color: var(--blue); }
  .total-card .value.sun { color: var(--sun); }
  .total-card .sub { font-size: 13px; color: var(--dim); margin-top: 2px; }

  /* Regi mascot card */
  .regi-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    text-decoration: none;
    transition: border-color 0.2s;
  }

  .regi-card:hover {
    border-color: var(--cyan);
  }

  .regi-icon {
    font-size: 32px;
    line-height: 1;
    margin-bottom: 2px;
  }

  .regi-label {
    font-size: 12px;
    font-weight: 600;
    color: #fff;
  }

  .regi-links {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 2px;
    font-size: 11px;
  }

  .regi-links a {
    color: var(--cyan);
    text-decoration: none;
  }

  .regi-links a:hover {
    text-decoration: underline;
  }

  .regi-links .dot {
    color: var(--dim);
  }

  /* Section Title */
  .section-title {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 16px;
    margin-top: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title .badge {
    font-size: 11px;
    background: var(--border);
    padding: 2px 8px;
    border-radius: 4px;
    color: var(--dim);
    font-weight: 400;
  }

  /* System Grid */
  .system-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .system-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .system-card h3 {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Battery Gauge */
  .gauge-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }

  .gauge {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: conic-gradient(var(--green) calc(var(--pct) * 1%), var(--border) 0);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }

  .gauge-inner {
    width: 62px;
    height: 62px;
    border-radius: 50%;
    background: var(--card);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .gauge-inner .pct {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }

  .gauge-inner .pct-label {
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .gauge.yellow { background: conic-gradient(var(--yellow) calc(var(--pct) * 1%), var(--border) 0); }
  .gauge.orange { background: conic-gradient(var(--orange) calc(var(--pct) * 1%), var(--border) 0); }
  .gauge.red { background: conic-gradient(var(--red) calc(var(--pct) * 1%), var(--border) 0); }

  .gauge-info { flex: 1; }

  .gauge-info .stat {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
  }

  .gauge-info .stat .val {
    color: #fff;
    font-weight: 500;
  }

  .gauge-info .stat .lbl { color: var(--dim); }

  /* Metrics Grid */
  .metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  @media (min-width: 768px) {
    .metrics.shop-metrics {
      grid-template-columns: repeat(6, 1fr);
    }
  }

  @media (min-width: 1000px) {
    .metrics.house-metrics {
      grid-template-columns: repeat(9, 1fr);
    }
  }

  .metric {
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
  }

  .metric .val {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }

  .metric .lbl {
    font-size: 11px;
    color: var(--dim);
    margin-top: 2px;
  }

  .metric .val.pos { color: var(--green); }
  .metric .val.neg { color: var(--orange); }
  .metric .val.neutral { color: var(--blue); }

  /* Forecast */
  .forecast-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .forecast-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    text-align: center;
  }

  .forecast-card .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--dim);
  }

  .forecast-card .value {
    font-size: 24px;
    font-weight: 700;
    color: var(--sun);
    margin: 4px 0;
  }

  .forecast-card .sub { font-size: 12px; color: var(--dim); }

  /* AC Array */
  .ac-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .ac-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ac-card .name { font-weight: 500; }
  .ac-card .state {
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 6px;
    font-weight: 600;
  }

  .ac-card .state.on { background: rgba(46,204,113,0.15); color: var(--green); }
  .ac-card .state.off { background: rgba(120,136,152,0.15); color: var(--dim); }

  /* Grid Info */
  .grid-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .grid-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .grid-card .lbl { font-size: 13px; color: var(--dim); }
  .grid-card .val { font-size: 20px; font-weight: 700; color: #fff; }

  /* Footer */
  .footer {
    text-align: center;
    color: var(--dim);
    font-size: 12px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    margin-top: 32px;
  }

  /* Status indicator */
  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }

  .status-dot.charging { background: var(--green); }
  .status-dot.discharging { background: var(--orange); }
  .status-dot.idle { background: var(--blue); }

  /* Responsive */
  @media (max-width: 768px) {
    .system-grid { grid-template-columns: 1fr; }
    .totals-bar { grid-template-columns: repeat(2, 1fr); }
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .forecast-grid { grid-template-columns: 1fr; }
    .ac-grid { grid-template-columns: 1fr; }
    .grid-bar { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .header-right { text-align: left; }
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60vh;
    color: var(--dim);
    font-size: 18px;
  }
</style>
</head>
<body>
<div class="back-bar">
  <a href="https://patrickdanforth.com">← patrickdanforth.com</a>
  <span class="live-label">☀️ Solar Scoreboard</span>
</div>
<div class="container">
  <div id="app">
    <div class="loading">☀️ Loading solar data...</div>
  </div>
</div>

<script>
// Phase 1 static capacity values
const INSTALLED = {
  house_pv_kw: 4.56,
  shop_pv_kw: 2.96,
  ac_array_kw: 5.67,
  house_battery_kwh: 20,
  shop_battery_kwh: 19.2,
  house_inverter_va: 5000,
  shop_inverter_va: 3000,
};

function gaugeColor(pct) {
  if (pct >= 50) return '';
  if (pct >= 30) return 'yellow';
  if (pct >= 15) return 'orange';
  return 'red';
}

function fmtW(v) {
  if (v === 'N/A' || v == null) return '—';
  v = typeof v === 'number' ? v : parseFloat(v);
  if (isNaN(v)) return '—';
  if (Math.abs(v) < 1000) return `${Math.round(v)} W`;
  return `${(v/1000).toFixed(1)} kW`;
}

function fmtKW(v) {
  if (v === 'N/A' || v == null) return '—';
  v = typeof v === 'number' ? v : parseFloat(v);
  if (isNaN(v)) return '—';
  return `${v.toFixed(2)} kW`;
}

function fmtKWH(v) {
  if (v === 'N/A' || v == null) return '—';
  v = typeof v === 'number' ? v : parseFloat(v);
  if (isNaN(v)) return '—';
  if (v < 1000) return `${v.toFixed(1)} kWh`;
  return `${(v/1000).toFixed(1)} MWh`;
}

function fmtPct(v) {
  if (v === 'N/A' || v == null) return '—';
  v = typeof v === 'number' ? v : parseFloat(v);
  return `${Math.round(v)}%`;
}

function fmtHours(v) {
  if (v === 'N/A' || v == null) return '—';
  v = typeof v === 'number' ? v : parseFloat(v);
  if (v < 1) return `${Math.round(v * 60)}m`;
  return `${v.toFixed(1)}h`;
}

function fmtSeconds(v) {
  if (v === 'N/A' || v == null) return '—';
  v = typeof v === 'number' ? v : parseFloat(v);
  if (v < 60) return `${Math.round(v)}s`;
  if (v < 3600) return `${Math.round(v/60)}m`;
  return `${(v/3600).toFixed(1)}h`;
}

function batteryStateLabel(state) {
  if (!state || state === 'N/A') return 'unknown';
  return state.toLowerCase();
}

function fmtTemp(v) {
  if (v === 'N/A' || v == null) return '—';
  v = typeof v === 'number' ? v : parseFloat(v);
  return `${Math.round(v)}°F`;
}

function render(d) {
  const h = d.house;
  const s = d.shop;
  const f = d.forecast;
  const a = d.ac_array;
  const g = d.grid;
  const w = d.weather;

  // Derived
  const totalPvKw = INSTALLED.house_pv_kw + INSTALLED.shop_pv_kw + INSTALLED.ac_array_kw;
  const totalBatteryKwh = INSTALLED.house_battery_kwh + INSTALLED.shop_battery_kwh;
  const totalInverterVa = INSTALLED.house_inverter_va + INSTALLED.shop_inverter_va;
  const currentHouseProd = parseFloat(h.solar_production_w) || 0;
  const currentShopPower = parseFloat(s.power_w) || 0;

  // CO2 avoided estimate: ~0.4 kg CO2 per kWh produced
  // We'll just show a placeholder for now
  const co2Avoided = 0;

  const houseBattPct = parseFloat(h.battery_soc_pct) || 0;
  const shopBattPct = parseFloat(s.battery_soc_pct) || 0;
  const shopCerboState = (s.tinker_town_battery_state || '').toLowerCase();
  const houseState = batteryStateLabel(h.battery_state);

  let ts = '';
  if (d.datetime) {
    ts = `Updated ${d.datetime}`;
  }

  return `
    <div class="header">
      <div class="header-left">
        <h1>☀️ Solar Scoreboard</h1>
        <div class="subtitle">${ts} &middot; Walling, TN</div>
      </div>
      <div class="header-right">
        ${fmtW(currentHouseProd + currentShopPower)} live production
      </div>
    </div>

    <div class="totals-bar">
      <div class="total-card">
        <div class="label">Total PV Installed</div>
        <div class="value sun">${totalPvKw.toFixed(2)}</div>
        <div class="sub">kW across 3 arrays</div>
      </div>
      <div class="total-card">
        <div class="label">Battery Storage</div>
        <div class="value green">${totalBatteryKwh}</div>
        <div class="sub">kWh total capacity</div>
      </div>
      <div class="total-card">
        <div class="label">House Time to Go</div>
        <div class="value ${houseBattPct > 50 ? 'green' : houseBattPct > 25 ? 'orange' : 'red'}">${fmtHours(h.battery_time_to_go_h)}</div>
        <div class="sub">${fmtPct(h.battery_soc_pct)} SOC · ${fmtW(Math.abs(parseFloat(h.battery_power_w) || 0))} draw</div>
      </div>
      <div class="total-card">
        <div class="label">Shop Time to Go</div>
        <div class="value ${shopBattPct > 50 ? 'green' : shopBattPct > 25 ? 'orange' : 'red'}">${fmtSeconds(s.time_to_go_s)}</div>
        <div class="sub">${fmtPct(s.battery_soc_pct)} SOC · ${fmtW(Math.abs(parseFloat(s.power_w) || 0))} draw</div>
      </div>
      <div class="total-card regi-card">
        <div class="regi-icon">🦞</div>
        <div class="regi-label">Rockin' Regi</div>
        <div class="regi-links">
          <a href="https://rockinregi.blogspot.com" target="_blank">Blog</a>
          <span class="dot">·</span>
          <a href="https://patrickdanforth.com/reginald-flipbook.html" target="_blank">Archive</a>
        </div>
      </div>
    </div>

    <div class="section-title">
      🏠 House System
      <span class="badge">Victron Multiplus II 5kVA &middot; 4.56 kW PV &middot; 20 kWh battery</span>
    </div>

    <div class="system-card">
      <h3>
        <span class="status-dot ${houseState === 'discharging' ? 'discharging' : houseState === 'charging' ? 'charging' : 'idle'}"></span>
        House — ${houseState.charAt(0).toUpperCase() + houseState.slice(1)}
      </h3>
      <div class="gauge-wrap">
        <div class="gauge ${gaugeColor(houseBattPct)}" style="--pct: ${houseBattPct}">
          <div class="gauge-inner">
            <span class="pct">${Math.round(houseBattPct)}</span>
            <span class="pct-label">SOC</span>
          </div>
        </div>
        <div class="gauge-info">
          <div class="stat"><span class="lbl">Battery Power</span><span class="val ${parseFloat(h.battery_power_w) < 0 ? 'neg' : 'pos'}">${fmtW(h.battery_power_w)}</span></div>
          <div class="stat"><span class="lbl">Cerbo Power</span><span class="val ${parseFloat(h.house_dc_battery_power_w) < 0 ? 'neg' : 'pos'}">${fmtW(h.house_dc_battery_power_w)}</span></div>
          <div class="stat"><span class="lbl">PV Production</span><span class="val pos">${fmtW(h.pv_power_w)}</span></div>
          <div class="stat"><span class="lbl">Bus Charge</span><span class="val ${parseFloat(h.bus_charge_power_w) < 0 ? 'neg' : 'pos'}">${fmtW(h.bus_charge_power_w)}</span></div>
          <div class="stat"><span class="lbl">House Load</span><span class="val">${fmtW(h.ac_loads_w)}</span></div>
          <div class="stat"><span class="lbl">Grid</span><span class="val">${parseFloat(h.grid_l1_w) === 0 ? 'Off-Grid ✓' : fmtW(h.grid_l1_w)}</span></div>
          <div class="stat"><span class="lbl">Inverter State</span><span class="val">${h.inverter_state !== 'N/A' ? h.inverter_state : '—'}</span></div>
          <div class="stat"><span class="lbl">Time to Go</span><span class="val">${fmtHours(h.battery_time_to_go_h)}</span></div>
        </div>
      </div>
      <div style="margin:8px 0 4px;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;">Cerbo GX (Victron) — Multiplus II 5kVA</div>
      <div class="metrics house-metrics">
        <div class="metric"><div class="val neutral">${h.battery_voltage_v !== 'N/A' ? parseFloat(h.battery_voltage_v).toFixed(1) : '—'}V</div><div class="lbl">Battery V</div></div>
        <div class="metric"><div class="val neutral">${h.battery_current_a !== 'N/A' ? parseFloat(h.battery_current_a).toFixed(1) : '—'}A</div><div class="lbl">Battery A</div></div>
        <div class="metric"><div class="val">${fmtW(h.inverter_output_w)}</div><div class="lbl">Inverter Out</div></div>
        <div class="metric"><div class="val neutral">${h.inverter_output_voltage_v !== 'N/A' ? parseFloat(h.inverter_output_voltage_v).toFixed(1) : '—'}V</div><div class="lbl">Output V</div></div>
        <div class="metric"><div class="val neutral">${h.inverter_output_frequency_hz !== 'N/A' ? parseFloat(h.inverter_output_frequency_hz).toFixed(1) : '—'}Hz</div><div class="lbl">Freq</div></div>
        <div class="metric"><div class="val neutral">${h.inverter_apparent_power_va !== 'N/A' ? Math.round(parseFloat(h.inverter_apparent_power_va)) : '—'} VA</div><div class="lbl">Apparent</div></div>
        <div class="metric"><div class="val neutral">${h.battery_amphours !== 'N/A' ? parseFloat(h.battery_amphours).toFixed(0) : '—'} Ah</div><div class="lbl">Net Ah</div></div>
        <div class="metric"><div class="val green">${fmtW(h.dc_pv_power_w)}</div><div class="lbl">DC PV</div></div>
        <div class="metric"><div class="val neutral">${h.inverter_lifetime_kwh !== 'N/A' ? parseFloat(h.inverter_lifetime_kwh).toFixed(0) : '—'} kWh</div><div class="lbl">Lifetime</div></div>
      </div>
    </div>

    <div class="section-title">
      🔧 Shop System
      <span class="badge">EG4 3000EHV-48 &middot; 2.96 kW PV &middot; 19.2 kWh battery</span>
    </div>

    <div class="system-card">
      <h3>
        <span class="status-dot ${shopCerboState === 'discharging' ? 'discharging' : shopCerboState === 'charging' ? 'charging' : 'idle'}"></span>
        Shop — ${shopCerboState ? shopCerboState.charAt(0).toUpperCase() + shopCerboState.slice(1) : '—'}
      </h3>
      <div class="gauge-wrap">
        <div class="gauge ${gaugeColor(shopBattPct)}" style="--pct: ${shopBattPct}">
          <div class="gauge-inner">
            <span class="pct">${Math.round(shopBattPct)}</span>
            <span class="pct-label">SOC</span>
          </div>
        </div>
        <div class="gauge-info">
          <div class="stat"><span class="lbl">SmartShunt Power</span><span class="val ${parseFloat(s.power_w) < 0 ? 'neg' : 'pos'}">${fmtW(s.power_w)}</span></div>
          <div class="stat"><span class="lbl">Cerbo Power</span><span class="val ${parseFloat(s.tinker_town_battery_power_w) < 0 ? 'neg' : 'pos'}">${fmtW(s.tinker_town_battery_power_w)}</span></div>
          <div class="stat"><span class="lbl">Cerbo SOC</span><span class="val">${fmtPct(s.tinker_town_battery_soc_pct)}</span></div>
          <div class="stat"><span class="lbl">DC Bus</span><span class="val neutral">${s.dc_bus_voltage_v !== 'N/A' ? parseFloat(s.dc_bus_voltage_v).toFixed(1) : '—'}V</span></div>
          <div class="stat"><span class="lbl">Cerbo State</span><span class="val">${s.tinker_town_battery_state !== 'N/A' ? (s.tinker_town_battery_state.charAt(0).toUpperCase() + s.tinker_town_battery_state.slice(1)) : '—'}</span></div>
          <div class="stat"><span class="lbl">Time to Go</span><span class="val">${fmtSeconds(s.time_to_go_s)}</span></div>
          <div class="stat"><span class="lbl">Lifetime Charged</span><span class="val green">${fmtKWH(s.charged_energy_kwh)}</span></div>
          <div class="stat"><span class="lbl">Lifetime Discharged</span><span class="val orange">${fmtKWH(s.discharged_energy_kwh)}</span></div>
        </div>
      </div>
      <div style="margin:8px 0 4px;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;">Cerbo GX (Tinker Town) — ${s.tinker_town_version || 'v3.80~25'}</div>
      <div class="metrics shop-metrics">
        <div class="metric"><div class="val neutral">${s.tinker_town_voltage_v !== 'N/A' ? parseFloat(s.tinker_town_voltage_v).toFixed(1) : '—'}V</div><div class="lbl">Battery Voltage</div></div>
        <div class="metric"><div class="val neutral">${s.tinker_town_current_a !== 'N/A' ? parseFloat(s.tinker_town_current_a).toFixed(1) : '—'}A</div><div class="lbl">Current</div></div>
        <div class="metric"><div class="val">${fmtTemp(s.battery_temp_f)}</div><div class="lbl">Battery Temp</div></div>
        <div class="metric"><div class="val neutral">${s.tinker_town_charge_energy_kwh !== 'N/A' ? parseFloat(s.tinker_town_charge_energy_kwh).toFixed(1) : '—'} kWh</div><div class="lbl">Month Chg</div></div>
        <div class="metric"><div class="val neutral">${s.tinker_town_discharge_energy_kwh !== 'N/A' ? parseFloat(s.tinker_town_discharge_energy_kwh).toFixed(1) : '—'} kWh</div><div class="lbl">Month Dischg</div></div>
        <div class="metric"><div class="val">${s.tinker_town_system_state !== 'N/A' ? s.tinker_town_system_state : '—'}</div><div class="lbl">System State</div></div>
      </div>
    </div>

    <div class="section-title">
      🌬️ AC Cooling Array
      <span class="badge">4 units · 3 systems · 7,230W dedicated solar</span>
    </div>

    <div class="ac-grid">
      <div class="ac-card">
        <div><span class="name">Homestead Mini</span><br><span style="font-size:12px;color:var(--dim);">2×705W = 1,410W solar-direct</span></div>
        <div style="text-align:right;"><span class="state ${a.homestead_mini_state === 'off' ? 'off' : 'on'}">${a.homestead_mini_state || '—'}</span><br><span style="font-size:11px;color:var(--dim);">${a.homestead_mini_temp != null ? Math.round(a.homestead_mini_temp) + '°F' : ''}</span></div>
      </div>
      <div class="ac-card">
        <div><span class="name">Tiny Mini</span><br><span style="font-size:12px;color:var(--dim);">3×370W = 1,110W solar-direct</span></div>
        <div style="text-align:right;"><span class="state ${a.tiny_mini_state === 'off' ? 'off' : 'on'}">${a.tiny_mini_state || '—'}</span><br><span style="font-size:11px;color:var(--dim);">${a.tiny_mini_temp != null ? Math.round(a.tiny_mini_temp) + '°F' : ''}</span></div>
      </div>
      <div class="ac-card">
        <div><span class="name">Small Bedroom</span><br><span style="font-size:12px;color:var(--dim);">5×315W = 1,575W solar-direct</span></div>
        <div style="text-align:right;"><span class="state ${a.small_bedroom_state === 'off' ? 'off' : 'on'}">${a.small_bedroom_state || '—'}</span><br><span style="font-size:11px;color:var(--dim);">${a.small_bedroom_temp != null ? Math.round(a.small_bedroom_temp) + '°F' : ''}</span></div>
      </div>
      <div class="ac-card">
        <div><span class="name">Big Bedroom</span><br><span style="font-size:12px;color:var(--dim);">5×315W = 1,575W solar-direct</span></div>
        <div style="text-align:right;"><span class="state ${a.big_bedroom_state === 'off' ? 'off' : 'on'}">${a.big_bedroom_state || '—'}</span><br><span style="font-size:11px;color:var(--dim);">${a.big_bedroom_temp != null ? Math.round(a.big_bedroom_temp) + '°F' : ''}</span></div>
      </div>
    </div>

    <div class="section-title">📊 Energy Forecast</div>

    <div class="forecast-grid">
      <div class="forecast-card">
        <div class="label">House Today</div>
        <div class="value">${fmtKWH(f.house_today_kwh)}</div>
        <div class="sub">${f.house_today_remaining_kwh !== 'N/A' ? `${fmtKWH(f.house_today_remaining_kwh)} remaining` : ''}</div>
      </div>
      <div class="forecast-card">
        <div class="label">Shop Today</div>
        <div class="value">${fmtKWH(f.shop_today_kwh)}</div>
        <div class="sub">${f.shop_today_remaining_kwh !== 'N/A' ? `${fmtKWH(f.shop_today_remaining_kwh)} remaining` : ''}</div>
      </div>
      <div class="forecast-card">
        <div class="label">Tomorrow</div>
        <div class="value">${((parseFloat(f.house_tomorrow_kwh)||0) + (parseFloat(f.shop_tomorrow_kwh)||0)).toFixed(1)} kWh</div>
        <div class="sub">combined forecast</div>
      </div>
    </div>

    <div class="section-title">🌍 Grid Context</div>

    <div class="grid-bar">
      <div class="grid-card">
        <span class="lbl">Grid CO₂ Intensity</span>
        <span class="val">${g.co2_intensity !== 'N/A' ? `${Math.round(parseFloat(g.co2_intensity))} gCO₂/kWh` : '—'}</span>
      </div>
      <div class="grid-card">
        <span class="lbl">Grid Fossil Fuel</span>
        <span class="val">${g.fossil_fuel_pct !== 'N/A' ? `${parseFloat(g.fossil_fuel_pct).toFixed(0)}%` : '—'}</span>
      </div>
    </div>

    <div class="footer">
      Disciples of Controlled Chaos &middot; Solar Scoreboard &middot; Phase 1
    </div>
  `;
}

async function load() {
  try {
    const resp = await fetch('snapshot.json?_=' + Date.now());
    const data = await resp.json();
    document.getElementById('app').innerHTML = render(data);
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--dim);">
        <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
        <div style="font-size:18px;margin-bottom:8px;">Could not load solar data</div>
        <div style="font-size:13px;">${e.message}</div>
      </div>
    `;
  }
}

load();
// Auto-refresh every 60 seconds
setInterval(load, 60000);
</script>
</body>
</html>
